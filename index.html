<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Agent v4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f7f8fa;--bg4:#eef0f3;
  --border:#e2e5ea;--border2:#d0d4db;
  --text:#1a1d23;--text2:#4a5060;--text3:#8a909d;
  --accent:#0f9d6e;--accent2:#0b8560;
  --amber:#d97706;--red:#dc3545;--blue:#2563eb;--purple:#7c3aed;--coral:#ea580c;
  --font:'Sora',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;} body{overflow:hidden;}
.app{display:grid;grid-template-columns:240px 1fr 380px;height:100vh;overflow:hidden;}

/* Sidebar */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:16px 14px 12px;border-bottom:1px solid var(--border);}
.logo{font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;}
.logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
.sec-label{padding:10px 14px 4px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.client-list{flex:1;overflow-y:auto;padding:4px 6px;}
.client-item{padding:7px 10px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:1px;transition:background .12s;}
.client-item:hover{background:var(--bg3);}
.client-item.active{background:#e8f5f0;border:1px solid rgba(15,157,110,.3);}
.c-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.c-name{font-size:12px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-badge{font-size:10px;font-family:var(--mono);background:var(--bg4);color:var(--text3);padding:1px 5px;border-radius:4px;}
.c-badge.alert{background:rgba(248,113,113,.15);color:var(--red);}
.sidebar-footer{padding:8px 6px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.btn-ghost{padding:7px 10px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;text-align:left;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}

/* Chat */
.main{display:flex;flex-direction:column;overflow:hidden;}
.main-header{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:10px;}
.main-title{font-size:14px;font-weight:600;}
.main-sub{font-size:11px;color:var(--text3);font-family:var(--mono);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.chat-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
.msg{display:flex;gap:9px;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.avatar{width:24px;height:24px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}
.avatar.ai{background:linear-gradient(135deg,var(--accent),#2563eb);color:#ffffff;}
.avatar.user{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);}
.bubble{max-width:80%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 13px;font-size:13px;line-height:1.65;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.msg.user .bubble{background:#e8f4ff;border-color:#bdd7f5;}
.bubble p{margin-bottom:6px;}.bubble p:last-child{margin-bottom:0;}
.bubble ul{padding-left:14px;margin:4px 0;}.bubble li{margin-bottom:3px;}
.bubble strong{color:var(--accent);font-weight:600;}
.bubble .report-block{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin:8px 0;font-size:12px;}
.bubble .rb-header{font-weight:600;font-size:13px;margin-bottom:6px;color:var(--text);}
.bubble .rb-row{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.bubble .rb-row:last-child{border-bottom:none;}
.bubble .rb-status{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.st-done{background:rgba(110,231,183,.12);color:var(--accent);}
.st-inprog{background:rgba(96,165,250,.12);color:var(--blue);}
.st-blocked{background:rgba(248,113,113,.15);color:var(--red);}
.st-notstart{background:var(--bg4);color:var(--text3);}
.thinking span{width:5px;height:5px;border-radius:50%;background:var(--text3);display:inline-block;animation:bounce 1.1s infinite;margin-right:3px;}
.thinking span:nth-child(2){animation-delay:.18s}.thinking span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.4);opacity:1}}
.input-wrap{padding:10px 20px 14px;border-top:1px solid var(--border);background:var(--bg2);}
.quick-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.chip{padding:4px 9px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-family:var(--font);font-size:11px;cursor:pointer;transition:all .12s;white-space:nowrap;}
.chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(15,157,110,.06);}
.input-row{display:flex;gap:6px;align-items:flex-end;}
.chat-in{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;resize:none;min-height:38px;max-height:100px;line-height:1.5;transition:border-color .15s;}
.chat-in:focus{outline:none;border-color:var(--accent);}
.chat-in::placeholder{color:var(--text3);}
.send-btn{width:38px;height:38px;border-radius:9px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:hover{background:var(--accent2);}

/* Right Panel */
.panel{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.panel-body{flex:1;overflow-y:auto;padding:10px;}

/* Client card */
.chc{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.chc-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.chc-dot{width:10px;height:10px;border-radius:50%;}
.chc-name{font-size:14px;font-weight:600;}
.chc-stage{margin-left:auto;font-size:10px;font-family:var(--mono);background:var(--bg4);color:var(--text3);padding:2px 7px;border-radius:4px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.stat{background:var(--bg4);border-radius:6px;padding:7px;text-align:center;}
.stat-n{font-size:16px;font-weight:600;font-family:var(--mono);}
.stat-l{font-size:10px;color:var(--text3);}

/* Service block */
.svc-block{background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;}
.svc-hdr{padding:9px 12px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:background .12s;user-select:none;}
.svc-hdr:hover{background:var(--bg4);}
.svc-hdr-name{font-size:13px;font-weight:600;flex:1;}
.svc-owner{font-size:11px;font-family:var(--mono);color:var(--blue);}
.svc-chev{font-size:10px;color:var(--text3);transition:transform .2s;display:inline-block;}
.svc-chev.open{transform:rotate(90deg);}
.svc-body{border-top:1px solid var(--border);padding:10px;}
.svc-body.hidden{display:none;}
.sec-hd{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:4px;}
.scope-box{font-size:12px;color:var(--text2);background:var(--bg4);border-radius:6px;padding:6px 8px;margin-bottom:8px;line-height:1.6;}
.del-list{list-style:none;padding:0;margin:0 0 8px;}
.del-item{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);}
.del-item:last-child{border-bottom:none;}
.del-freq{font-size:10px;font-family:var(--mono);color:var(--purple);background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.2);padding:1px 5px;border-radius:4px;margin-left:auto;}

/* Task rows */
.task-card{background:var(--bg4);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;overflow:hidden;}
.task-card.blocked{border-left:3px solid var(--red);}
.task-card.overdue{border-left:3px solid var(--amber);}
.task-top{padding:8px 10px;display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
.task-top:hover{background:rgba(255,255,255,.02);}
.task-title{font-size:12px;font-weight:500;flex:1;}
.task-title.done{text-decoration:line-through;color:var(--text3);}
.task-pills{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
.pill{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:4px;}
.p-done{background:rgba(110,231,183,.12);color:var(--accent);}
.p-inprog{background:rgba(96,165,250,.12);color:var(--blue);}
.p-blocked{background:rgba(248,113,113,.15);color:var(--red);}
.p-notstart{background:var(--bg3);color:var(--text3);}
.p-high{background:rgba(251,191,36,.12);color:var(--amber);}
.p-client{background:rgba(110,231,183,.1);color:var(--accent);}
.p-email{background:rgba(96,165,250,.1);color:var(--blue);}
.p-due{background:var(--bg3);color:var(--text3);}
.p-due.od{background:rgba(248,113,113,.15);color:var(--red);}
.p-due.td{background:rgba(251,191,36,.12);color:var(--amber);}
.task-chev{font-size:9px;color:var(--text3);transition:transform .2s;margin-top:2px;}
.task-chev.open{transform:rotate(90deg);}
.task-detail{padding:0 10px 8px;border-top:1px solid var(--border);}
.blocker-note{font-size:11px;color:var(--red);background:rgba(248,113,113,.08);border-radius:5px;padding:5px 7px;margin:6px 0;}
.subtasks{margin-top:6px;}
.subtask-row{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--border);}
.subtask-row:last-child{border-bottom:none;}
.stchk{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.stchk.done{background:var(--accent);border-color:var(--accent);}
.stchk.done::after{content:'';display:block;width:3px;height:5px;border:1.5px solid #ffffff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);}
.st-name{font-size:11px;flex:1;}.st-name.done{text-decoration:line-through;color:var(--text3);}
.st-meta{font-size:10px;font-family:var(--mono);color:var(--text3);}
.task-actions{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.btn-xs{padding:4px 8px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-family:var(--font);font-size:10px;cursor:pointer;transition:all .15s;}
.btn-xs:hover{border-color:var(--accent);color:var(--accent);}
.btn-xs.primary{background:var(--accent);border-color:var(--accent);color:#ffffff;font-weight:600;}
.btn-inline{width:100%;padding:6px;border-radius:6px;border:1px dashed var(--border2);background:transparent;color:var(--text3);font-family:var(--font);font-size:11px;cursor:pointer;transition:all .15s;margin-top:5px;}
.btn-inline:hover{border-color:var(--accent);color:var(--accent);}

/* Status picker */
.status-picker{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0;}
.sp-btn{padding:3px 8px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .12s;}
.sp-btn.active-done{background:rgba(110,231,183,.15);border-color:var(--accent);color:var(--accent);}
.sp-btn.active-inprog{background:rgba(96,165,250,.12);border-color:var(--blue);color:var(--blue);}
.sp-btn.active-blocked{background:rgba(248,113,113,.15);border-color:var(--red);color:var(--red);}
.sp-btn.active-notstart{background:var(--bg4);border-color:var(--border2);color:var(--text2);}

/* Team */
.member-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:7px;}
.member-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.member-av{width:30px;height:30px;border-radius:8px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--blue);flex-shrink:0;}
.member-name{font-size:13px;font-weight:600;}
.member-role{font-size:11px;color:var(--text3);font-family:var(--mono);}
.member-stats{margin-left:auto;text-align:right;}
.member-stat-n{font-size:15px;font-weight:600;font-family:var(--mono);}
.member-stat-l{font-size:10px;color:var(--text3);}

/* Email panel */
.email-card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:6px;cursor:pointer;transition:border-color .12s;}
.email-card:hover{border-color:var(--border2);}
.email-card.unread{border-left:3px solid var(--accent);}
.email-card.flagged{border-left:3px solid var(--amber);}
.email-from{font-size:12px;font-weight:600;margin-bottom:2px;}
.email-subject{font-size:12px;color:var(--text2);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.email-preview{font-size:11px;color:var(--text3);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.email-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.email-detail-box{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;}
.email-body-txt{font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-wrap;}
.draft-box{background:rgba(110,231,183,.05);border:1px solid rgba(110,231,183,.2);border-radius:8px;padding:10px;margin:8px 0;}
.draft-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-bottom:5px;}
.draft-textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:8px;color:var(--text);font-family:var(--font);font-size:12px;resize:vertical;min-height:80px;line-height:1.6;}
.draft-textarea:focus{outline:none;border-color:var(--accent);}
.email-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.connect-box{text-align:center;padding:24px 16px;}
.connect-title{font-size:14px;font-weight:600;margin-bottom:6px;}
.connect-sub{font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:14px;}
.review-banner{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:var(--amber);}

/* Modals */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;width:100vw;height:100vh;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:8000;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;width:500px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;}
.fg{margin-bottom:11px;}
.flabel{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);display:block;margin-bottom:4px;}
.finput,.fselect,.ftextarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 9px;color:var(--text);font-family:var(--font);font-size:13px;transition:border-color .15s;}
.finput:focus,.fselect:focus,.ftextarea:focus{outline:none;border-color:var(--accent);}
.ftextarea{resize:vertical;min-height:58px;line-height:1.5;}
.fselect option{background:var(--bg3);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-primary{width:100%;padding:9px;border-radius:8px;background:var(--accent);border:none;color:#0e0f11;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;}
.btn-primary:hover{background:var(--accent2);}
.btn-cancel{width:100%;padding:8px;border-radius:8px;background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--font);font-size:13px;cursor:pointer;margin-top:5px;}
.svc-check-grid{display:flex;flex-wrap:wrap;gap:5px;}
.svc-chk-label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);cursor:pointer;padding:4px 8px;border:1px solid var(--border2);border-radius:6px;}
.svc-chk-label input{accent-color:var(--accent);}
.del-builder{border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:4px;}
.del-row-b{display:flex;gap:5px;padding:6px 7px;border-bottom:1px solid var(--border);align-items:center;}
.del-row-b:last-child{border-bottom:none;}
.del-in{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--font);font-size:12px;}
.del-in:focus{outline:none;}
.del-fsel{background:var(--bg4);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-family:var(--mono);font-size:10px;padding:2px 4px;}
.del-rm{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:15px;line-height:1;}
.del-rm:hover{color:var(--red);}
.tog-wrap{display:flex;align-items:center;gap:7px;}
.tog{width:32px;height:17px;border-radius:9px;background:var(--bg4);border:1px solid var(--border2);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.tog.on{background:var(--accent);}
.tog::after{content:'';position:absolute;width:11px;height:11px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s;}
.tog.on::after{transform:translateX(15px);}
.tog-lbl{font-size:12px;color:var(--text2);}

/* Azure config */
.azure-config{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.azure-status{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.az-dot{width:7px;height:7px;border-radius:50%;}
.az-dot.connected{background:var(--accent);}
.az-dot.disconnected{background:var(--text3);}
.az-dot.pending{background:var(--amber);animation:pulse 1s infinite;}
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px;}
.perm-item{font-size:10px;font-family:var(--mono);padding:3px 7px;border-radius:4px;background:var(--bg4);color:var(--text3);display:flex;align-items:center;gap:4px;}
.perm-item.granted{color:var(--accent);}
.perm-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}


  /* ── Live tracker ── */
  .tracker-overlay{position:fixed;top:0;left:0;right:0;bottom:0;width:100vw;height:100vh;background:var(--bg);z-index:9999;display:flex;flex-direction:column;overflow:hidden;}
  .tracker-header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg2);flex-shrink:0;}
  .tracker-client-name{font-size:16px;font-weight:600;}
  .tracker-updated{font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:8px;}
  .tracker-header-right{margin-left:auto;display:flex;gap:7px;align-items:center;}
  .tracker-svc-tabs{display:flex;gap:4px;padding:10px 24px 0;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
  .tracker-tab{padding:6px 14px;border-radius:6px 6px 0 0;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;border-bottom:none;color:var(--text3);transition:all .12s;}
  .tracker-tab:hover{color:var(--text2);}

<script>
// Global function shims — ensures functions are available when HTML onclick fires
function openTracker(id){ if(typeof _openTracker==='function') _openTracker(id); else setTimeout(()=>openTracker(id),100); }
function closeTracker(){ if(typeof _closeTracker==='function') _closeTracker(); }

// ═══════════════════════════════════════════
// TRACKER STATE — must be declared before any onclick can fire
let trackerState = { clientId: null, activeSvc: null };

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const COLORS=['#6ee7b7','#60a5fa','#a78bfa','#fbbf24','#f87171','#34d399','#fb923c','#e879f9','#38bdf8','#a3e635'];
const ALL_SVCS=['HR','Finance','TA','Legal','IT','Operations','Marketing','Others'];
const FREQS=['One-off','Weekly','Bi-weekly','Monthly','Quarterly','As needed'];
const STATUS_LABELS={notstart:'Not started',inprog:'In progress',blocked:'Blocked',done:'Done'};
const STATUS_CLASSES={notstart:'p-notstart',inprog:'p-inprog',blocked:'p-blocked',done:'p-done'};
const SVC_TPL={
  Marketing:['Brand positioning review','Content calendar planning','Campaign performance report','Social media audit','Market research summary','Competitor analysis','Campaign brief review','Agency coordination'],
  Others:['Ad hoc request','General coordination','Follow-up action','Meeting notes and actions','Escalation handling','Cross-team dependency','Miscellaneous task'],
  HR:['Onboarding new hire','Monthly payroll review','Policy document update','Performance review','Leave management audit','Employee contract renewal','Training compliance check','HR audit report'],
  Finance:['Monthly bookkeeping close','Invoice reconciliation','Payroll processing','Tax filing prep','Budget variance report','Cash flow forecast','Vendor payment run','Financial statements'],
  TA:['Job description drafting','Candidate pipeline review','Interview scheduling','Offer letter preparation','Background check follow-up','Recruitment report','Sourcing strategy review'],
  Legal:['Contract review','NDA preparation','Compliance checklist','Regulatory filing','Legal risk assessment','Board resolution drafting','IP filing status'],
  IT:['Monthly security audit','Software licence review','Backup verification','System access audit','Vendor SLA review','Infrastructure health check','Incident report'],
  Operations:['Process documentation','SOP review','Vendor coordination','Facility readiness check','Operational risk review','KPI reporting','Escalation log review']
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let S={
  clients:[],
  services:[],
  tasks:[],
  demandPlan:[],   // {id,clientId,role,level,dept,headcount,location,targetStart,budgetApproved,ownerId}
  hiringTracker:[], // {id,planId,clientId,role,candidateName,stage,offerDate,joiningDate,comment,blocker}      // {id,clientId,svcId,name,due,priority,status,blockerNote,ownerId,clientVisible,source,subtasks:[{id,name,due,ownerId,status}]}
  team:[],
  emails:[],
  reviewTray:[],  // [{emailId, suggested:{tasks,decisions,followUps,sentiment}, draftReply, approved}]
  msConfig:{tenantId:'',clientId:'',clientSecret:'',sharedMailbox:'',connected:false},
  activeClient:null,
  activeTab:'overview',
  activeEmail:null,
  chatHistory:[],
  _scopeQ:null,
  _taskCtx:null,
  _stCtx:null,
  _addSvcCid:null,
};
let nC=1,nS=1,nT=1,nM=1,nST=1;

// ═══════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════
const td=()=>new Date().toISOString().split('T')[0];
const ago=(n)=>{const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0];};
const frm=(n)=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];};
const isOD=(t)=>t.status!=='done'&&t.due<td();
const isTD=(t)=>t.status!=='done'&&t.due===td();
const fmtDue=(t)=>{
  if(t.status==='done') return 'Done';
  if(isOD(t)){const d=Math.ceil((new Date(td())-new Date(t.due))/86400000);return d+'d overdue';}
  if(isTD(t)) return 'Today';
  return t.due;
};
const fmtDate=(s)=>{if(!s)return'';const d=new Date(s);const now=new Date();const diff=now-d;if(diff<3600000)return Math.floor(diff/60000)+'m ago';if(diff<86400000)return Math.floor(diff/3600000)+'h ago';if(diff<604800000)return Math.floor(diff/86400000)+'d ago';return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});};

// ═══════════════════════════════════════════
// LOCALSTORAGE

// ── localStorage cache (instant reads/writes) ──
function saveLocal(){
  try{localStorage.setItem(SK,JSON.stringify({clients:S.clients,services:S.services,tasks:S.tasks,team:S.team,emails:S.emails,reviewTray:S.reviewTray,msConfig:S.msConfig,demandPlan:S.demandPlan,hiringTracker:S.hiringTracker,nC,nS,nT,nM,nST,nDP:window.nDP||1,nHT:window.nHT||1}));}catch(e){}
}

function loadLocal(){
  try{
    const r=localStorage.getItem(SK);
    if(!r)return false;
    const d=JSON.parse(r);
    if(!d.clients||!d.clients.length)return false;
    Object.assign(S,{clients:d.clients,services:d.services||[],tasks:d.tasks||[],team:d.team||[],emails:d.emails||[],reviewTray:d.reviewTray||[],msConfig:d.msConfig||S.msConfig,demandPlan:d.demandPlan||[],hiringTracker:d.hiringTracker||[]});window.nDP=d.nDP||1;window.nHT=d.nHT||1;
    nC=d.nC||nC;nS=d.nS||nS;nT=d.nT||nT;nM=d.nM||nM;nST=d.nST||nST;
    return true;
  }catch(e){return false;}
}

// ── Google Sheets sync ──
// Uses the public JSON export trick + Apps Script webhook for writes
// Sheet must be "Anyone with link can edit"

async function saveToSheets(){
  // We write the full state as a single JSON blob to cell A1 of a hidden "State" sheet
  // This is the simplest approach — one cell, full JSON, no column mapping needed
  // For writes we need Apps Script deployed as web app (see setup instructions)
  const webhookUrl=S.sheetsWebhook;
  if(!webhookUrl)return; // Not configured yet
  try{
    const data={
      clients:S.clients,services:S.services,tasks:S.tasks,
      team:S.team,nC,nS,nT,nM,nST,
      lastSaved:new Date().toISOString(),
      savedBy:S.currentUser||'PM'
    };
    await fetch(webhookUrl,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });
  }catch(e){console.warn('Sheets sync failed, using local cache',e);}
}

async function loadFromSheets(){
  // Read from the public JSON export of the State sheet
  const webhookUrl=S.sheetsWebhook;
  if(!webhookUrl)return false;
  try{
    const res=await fetch(webhookUrl+'?action=read');
    if(!res.ok)return false;
    const d=await res.json();
    if(!d.clients||!d.clients.length)return false;
    Object.assign(S,{clients:d.clients,services:d.services||[],tasks:d.tasks||[],team:d.team||[]});
    nC=d.nC||nC;nS=d.nS||nS;nT=d.nT||nT;nM=d.nM||nM;nST=d.nST||nST;
    saveLocal(); // Cache locally
    return true;
  }catch(e){return false;}
}

// ── Combined save — local immediately, Sheets async ──
function save(){
  saveLocal();
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    saveToSheets().then(()=>{
      // Show subtle sync indicator
      const el=document.getElementById('syncIndicator');
      if(el){el.textContent='Synced';el.style.color='var(--accent)';setTimeout(()=>{el.textContent='';},2000);}
    });
  },1000); // Debounce — wait 1s after last change before syncing
}

// ── Combined load — try Sheets first, fall back to local ──
async function load(){
  const fromSheets=await loadFromSheets();
  if(fromSheets)return true;
  return loadLocal();
}

function clearState(){
  if(!confirm('Reset to demo data?')) return;
  // Clear everything synchronously before reload
  try{localStorage.clear();}catch(e){}
  try{sessionStorage.clear();}catch(e){}
  // Reset state in memory immediately
  S.clients=[];S.services=[];S.tasks=[];S.team=[];
  S.emails=[];S.reviewTray=[];S.demandPlan=[];S.hiringTracker=[];
  nC=1;nS=1;nT=1;nM=1;nST=1;window.nDP=1;window.nHT=1;
  // Seed fresh data right now without reloading
  seed();
  renderAll();
  addAIMsg('Data reset. UKG loaded fresh from tracker.');
}

function renderSidebar(){
  const el=document.getElementById('clientList');

  const allOpen=S.tasks.filter(t=>t.status!=='done').length;
  const allRow=mkEl('div',`client-item${S.activeClient===null?' active':''}`,
    `<div class="c-dot" style="background:#5c5f66"></div><div class="c-name">All clients</div><div class="c-badge${allOD>0?' alert':''}">${allOpen}</div>`);

  el.appendChild(allRow);
  S.clients.forEach(c=>{
    const od=S.tasks.filter(t=>t.clientId===c.id&&isOD(t)).length;
    const open=S.tasks.filter(t=>t.clientId===c.id&&t.status!=='done').length;

    row.onclick=()=>{S.activeClient=c.id;renderAll();};
    el.appendChild(row);
  });
}

  document.getElementById('svcbody-'+id)?.classList.toggle('hidden');

}

function taskCardHtml(t){
  const assignee=S.team.find(m=>m.id===t.ownerId);
  const od=isOD(t),tdd=isTD(t);
  const hasSubs=t.subtasks&&t.subtasks.length>0;
  const subsDone=hasSubs?t.subtasks.filter(s=>s.status==='done').length:0;
  return `<div class="task-card ${t.status==='blocked'?'blocked':od?'overdue':''}" id="tc-${t.id}">
    <div class="task-top" onclick="toggleTaskDetail(${t.id})">
      <div class="task-info" style="flex:1">
        <div class="task-title${t.status==='done'?' done':''}">${t.name}</div>
        <div class="task-pills">
          <span class="pill ${STATUS_CLASSES[t.status]}">${STATUS_LABELS[t.status]}</span>
          <span class="pill p-due${od?' od':tdd?' td':''}">${fmtDue(t)}</span>
          ${t.priority==='High'?'<span class="pill p-high">High</span>':''}
          ${t.clientVisible?'<span class="pill p-client">Client</span>':''}
          ${t.source==='email'?'<span class="pill p-email">Email</span>':''}
          ${assignee?`<span class="pill" style="background:rgba(96,165,250,.1);color:var(--blue)">${assignee.name.split(' ')[0]}</span>`:''}
          ${hasSubs?`<span class="pill" style="background:var(--bg4);color:var(--text3)">${subsDone}/${t.subtasks.length} steps</span>`:''}
        </div>
      </div>
      <span class="task-chev" id="tchev-${t.id}">▶</span>
    </div>
    <div class="task-detail hidden" id="td-${t.id}">
      ${t.blockerNote?`<div class="blocker-note">Blocked: ${t.blockerNote}</div>`:''}
      <div class="status-picker">
        ${['notstart','inprog','blocked','done'].map(s=>`<button class="sp-btn${t.status===s?' active-'+s:''}" onclick="setTaskStatus(${t.id},'${s}')">${STATUS_LABELS[s]}</button>`).join('')}
      </div>
      ${t.status==='blocked'?`<input class="finput" style="font-size:11px;margin-bottom:6px" placeholder="Blocker reason..." value="${t.blockerNote||''}" onchange="setBlockerNote(${t.id},this.value)">`:''}
      ${hasSubs?`<div class="sec-hd" style="margin-top:4px">Steps</div><div class="subtasks">${t.subtasks.map(st=>subtaskRow(st,t.id)).join('')}</div>`:''}
      <div class="task-actions">
        <button class="btn-xs primary" onclick="openAddSubtask(${t.id})">+ Step</button>
        <button class="btn-xs" onclick="sendQuick('Draft a client update email for this task: ${t.name.replace(/'/g,'')}')">Draft email</button>
      </div>
    </div>
  </div>`;
}

function subtaskRow(st,tid){
  const a=S.team.find(m=>m.id===st.ownerId);
  return `<div class="subtask-row">
    <div class="stchk${st.status==='done'?' done':''}" onclick="toggleSubtask(${tid},${st.id})"></div>
    <div class="st-name${st.status==='done'?' done':''}">${st.name}</div>
    <div class="st-meta">${a?a.name.split(' ')[0]:''} · ${st.due||''}</div>
  </div>`;
}

function toggleTaskDetail(id){
  document.getElementById('td-'+id)?.classList.toggle('hidden');
  document.getElementById('tchev-'+id)?.classList.toggle('open');
}

function setTaskStatus(tid,status){
  const t=S.tasks.find(t=>t.id===tid);
  if(!t) return;
  t.status=status;
  if(status!=='blocked') t.blockerNote='';
  save(); renderAll();
}

function setBlockerNote(tid,val){
  const t=S.tasks.find(t=>t.id===tid);
  if(t){t.blockerNote=val;save();}
}

function toggleSubtask(tid,stid){
  const t=S.tasks.find(t=>t.id===tid);
  const st=t?.subtasks?.find(s=>s.id===stid);
  if(st){st.status=st.status==='done'?'notstart':'done';save();renderAll();}
}

    {label:'Blocked',col:'var(--red)',items:tasks.filter(t=>t.status==='blocked')},

function linkToClient(emailId){
  const names=S.clients.map(c=>c.name).join(', ');

  const c=S.clients.find(c=>c.name.toLowerCase()===choice?.toLowerCase().trim());

function addSuggestedTask(t,clientId){
  const cid=clientId||S.activeClient||S.clients[0]?.id;
  const svc=S.services.find(s=>s.clientId===cid&&s.name===t.service)||S.services.find(s=>s.clientId===cid);
  if(!svc){addAIMsg('Please link the email to a client first.');return;}
  S.tasks.push({id:nT++,clientId:cid,svcId:svc.id,name:t.name,due:frm(7),priority:t.priority||'Medium',status:'notstart',blockerNote:'',ownerId:svc.ownerId||null,clientVisible:false,source:'email',subtasks:[]});
  save();renderAll();
  addAIMsg('Task added from email: <strong>'+t.name+'</strong>');
}

async function analyseEmail(id){
  const em=S.emails.find(e=>e.id===id)||getDemoEmails().find(e=>e.id===id);
  if(!em)return;
  addAIMsg('Analysing email with AI...');
  const sys='You are a PM Agent. Analyse this email and return ONLY valid JSON in this exact format: {"sentiment":{"label":"urgent|frustrated|happy|neutral","summary":"one sentence"},"tasks":[{"name":"string","priority":"High|Medium|Low","service":"HR|Finance|TA|Legal|IT|Operations","dueHint":"string or null"}],"decisions":[{"text":"string"}],"followUps":[{"text":"string","waitingOn":"us|client"}],"draftReply":"string — professional reply acknowledging the email and key points"}';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,
        messages:[{role:'user',content:'From: '+em.from+' Subject: '+em.subject+' Body: '+em.body+' Client context: '+S.clients.map(c=>c.name).join(', ')}]})});
    const data=await res.json();
    const txt=data.content?.[0]?.text||'{}';
    const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    let existing=S.reviewTray.find(r=>r.emailId===id);
    if(!existing){existing={emailId:id,suggested:parsed,draftReply:parsed.draftReply||'',approved:false};S.reviewTray.push(existing);}
    else{existing.suggested=parsed;existing.draftReply=parsed.draftReply||'';}
    save();renderPanel();
    addAIMsg('Email analysed. Found <strong>'+(parsed.tasks?.length||0)+'</strong> tasks, sentiment: <strong>'+(parsed.sentiment?.label||'neutral')+'</strong>. Review in the Email tab.');
  }catch(e){addAIMsg('Could not analyse email: '+e.message);}
}

async function draftReply(id){
  const em=S.emails.find(e=>e.id===id)||getDemoEmails().find(e=>e.id===id);
  if(!em)return;
  if(!S.reviewTray.find(r=>r.emailId===id)){await analyseEmail(id);return;}
  renderPanel();
}

async function approveSend(emailId){
  const el=document.getElementById('draft-'+emailId);
  const draft=el?el.value:'';
  if(!draft){alert('No draft to send.');return;}
  if(!S.msConfig.connected){
    addAIMsg('Microsoft 365 not connected yet. When connected, this draft will be sent from <strong>'+( S.msConfig.sharedMailbox||'pm@yourfirm.com')+'</strong>.<br><br><strong>Draft that would be sent:</strong><br><em>'+draft+'</em>');
    const tr=S.reviewTray.find(r=>r.emailId===emailId);
    if(tr) tr.approved=true;
    save();renderPanel();return;
  }
  try{
    const em=S.emails.find(e=>e.id===emailId);
    await sendEmail({to:em?.fromEmail||'',subject:'Re: '+(em?.subject||''),body:draft});
    const tr=S.reviewTray.find(r=>r.emailId===emailId);
    if(tr) tr.approved=true;
    save();renderPanel();
    addAIMsg('Reply sent from <strong>'+(S.msConfig.sharedMailbox||'pm@yourfirm.com')+'</strong>.');
  }catch(e){addAIMsg('Send failed: '+e.message);}
}

async function regenerateDraft(emailId){
  const tr=S.reviewTray.find(r=>r.emailId===emailId);
  if(tr){tr.draftReply='';save();}
  await analyseEmail(emailId);
}

function dismissTray(emailId){
  const tr=S.reviewTray.find(r=>r.emailId===emailId);
  if(tr) tr.approved=true;
  save();renderPanel();
}

async function connectMS(){
  const tid=document.getElementById('ms-tid')?.value.trim();
  const cid=document.getElementById('ms-cid')?.value.trim();
  const sec=document.getElementById('ms-sec')?.value.trim();
  const mb=document.getElementById('ms-mb')?.value.trim();
  if(!tid||!cid||!sec){alert('Please fill in Tenant ID, Client ID, and Client Secret.');return;}
  S.msConfig={tenantId:tid,clientId:cid,clientSecret:sec,sharedMailbox:mb,connected:false};
  save();renderPanel();
  try{
    const token=await getMSToken();
    S.msConfig.connected=true;save();renderPanel();
    addAIMsg('Connected to Microsoft 365. Syncing emails...');
    await syncEmails();
  }catch(e){addAIMsg('Connection failed: '+e.message+'<br><br>Check your Tenant ID, Client ID and Secret.');}
}

async function getMSToken(){
  const{tenantId,clientId,clientSecret}=S.msConfig;
  const res=await fetch('https://login.microsoftonline.com/'+tenantId+'/oauth2/v2.0/token',{
    method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({client_id:clientId,client_secret:clientSecret,scope:'https://graph.microsoft.com/.default',grant_type:'client_credentials'})
  });
  const data=await res.json();
  if(data.access_token) return data.access_token;
  throw new Error(data.error_description||'Token failed');
}

async function syncEmails(){
  if(!S.msConfig.connected){addAIMsg('Not connected to Microsoft 365 yet.');return;}
  try{
    const token=await getMSToken();
    const res=await fetch('https://graph.microsoft.com/v1.0/me/messages?$top=25&$select=id,from,subject,bodyPreview,body,receivedDateTime,isRead&$orderby=receivedDateTime desc',
      {headers:{Authorization:'Bearer '+token}});
    const data=await res.json();
    if(data.value){
      S.emails=data.value.map(m=>({
        id:m.id,from:m.from?.emailAddress?.name||m.from?.emailAddress?.address||'Unknown',
        fromEmail:m.from?.emailAddress?.address||'',subject:m.subject||'(no subject)',
        preview:m.bodyPreview||'',body:m.body?.content?.replace(/<[^>]*>/g,' ')||m.bodyPreview||'',
        date:m.receivedDateTime,clientId:guessClient(m),read:m.isRead,flagged:false
      }));
      save();renderPanel();
      addAIMsg('Synced <strong>'+S.emails.length+'</strong> emails. Auto-triaging against your clients...');
      await autoTriageAll(token);
    }
  }catch(e){addAIMsg('Email sync failed: '+e.message);}
}

function guessClient(msg){
  const text=((msg.subject||'')+' '+(msg.bodyPreview||'')+' '+(msg.from?.emailAddress?.address||'')).toLowerCase();
  return S.clients.find(c=>text.includes(c.name.toLowerCase()))?.id||null;
}

async function autoTriageAll(token){
  const relevant=S.emails.filter(e=>e.clientId&&!S.reviewTray.find(r=>r.emailId===e.id));
  for(const em of relevant.slice(0,5)){
    await analyseEmail(em.id);
    await new Promise(r=>setTimeout(r,500));
  }
}

async function sendEmail({to,subject,body}){
  const token=await getMSToken();
  const mailbox=S.msConfig.sharedMailbox||'me';
  const endpoint=mailbox&&mailbox!=='me'?
    'https://graph.microsoft.com/v1.0/users/'+mailbox+'/sendMail':
    'https://graph.microsoft.com/v1.0/me/sendMail';
  const res=await fetch(endpoint,{
    method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({message:{subject,body:{contentType:'Text',content:body},toRecipients:[{emailAddress:{address:to}}]},saveToSentItems:true})
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||'Send failed');}
}

async function generateAndEmailReport(){
  addUserMsg('Daily status report — UKG');
  const today = td();

  // Build report entirely in JS — no API call needed
  const redFlags = [];
  const clientSections = [];

  S.clients.forEach(c => {
    const svcs = S.services.filter(s => s.clientId === c.id);
    const svcSections = [];

    svcs.forEach(svc => {
      const owner = S.team.find(m => m.id === svc.ownerId);
      const tasks = S.tasks.filter(t => t.svcId === svc.id);
      const openTasks = tasks.filter(t => t.status !== 'done');
      const doneTasks = tasks.filter(t => t.status === 'done');

      openTasks.forEach(t => {
        const a = S.team.find(m => m.id === t.ownerId);
        const daysOD = isOD(t) ? Math.ceil((new Date(today) - new Date(t.due)) / 86400000) : 0;
        if (isOD(t) || t.status === 'blocked') {
          redFlags.push({
            client: c.name, svc: svc.name, task: t.name,
            issue: isOD(t) ? daysOD + 'd overdue' : 'BLOCKED: ' + (t.blockerNote || 'no reason given'),
            owner: a?.name || 'Unassigned'
          });
        }
      });

      svcSections.push({ svc, owner, openTasks, doneTasks });
    });

    clientSections.push({ client: c, svcSections });
  });

  // Render as formatted HTML report in chat
  let html = '<div style="font-family:var(--mono);font-size:12px;line-height:1.8">';
  html += '<div style="font-size:14px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">Daily Status Report — ' + today + '</div>';

  // Red flags section
  if (redFlags.length) {
    html += '<div style="background:rgba(220,53,69,.08);border:1px solid rgba(220,53,69,.2);border-radius:8px;padding:10px;margin-bottom:14px">';
    html += '<div style="font-weight:600;color:var(--red);margin-bottom:6px">RED FLAGS (' + redFlags.length + ')</div>';
    redFlags.forEach(f => {
      html += '<div style="padding:3px 0;border-bottom:1px solid rgba(220,53,69,.1)">&#9888; <strong>' + f.client + ' · ' + f.svc + '</strong> — ' + f.task + ' — <span style="color:var(--red)">' + f.issue + '</span> · ' + f.owner + '</div>';
    });
    html += '</div>';
  } else {
    html += '<div style="background:rgba(15,157,110,.08);border:1px solid rgba(15,157,110,.2);border-radius:8px;padding:8px 12px;margin-bottom:14px;color:var(--accent)">No red flags today</div>';
  }

  // Per client sections
  clientSections.forEach(({ client, svcSections }) => {
    html += '<div style="margin-bottom:14px">';
    html += '<div style="font-weight:600;font-size:13px;color:var(--text);padding:6px 0;border-bottom:2px solid var(--border);margin-bottom:8px">' + client.name + ' <span style="font-size:10px;color:var(--text3);font-weight:400">' + client.stage + '</span></div>';

    svcSections.forEach(({ svc, owner, openTasks, doneTasks }) => {
      html += '<div style="margin-bottom:10px;padding-left:12px;border-left:2px solid var(--border)">';
      html += '<div style="font-weight:600;font-size:12px;margin-bottom:4px">' + svc.name + ' <span style="color:var(--blue);font-weight:400">' + (owner?.name || 'No owner') + '</span> <span style="color:var(--text3);font-size:10px">(' + openTasks.length + ' open' + (doneTasks.length ? ', ' + doneTasks.length + ' done' : '') + ')</span></div>';

      if (openTasks.length === 0) {
        html += '<div style="color:var(--text3);font-size:11px">All tasks complete</div>';
      } else {
        openTasks.forEach(t => {
          const a = S.team.find(m => m.id === t.ownerId);
          const statusColor = t.status === 'blocked' ? 'var(--red)' : t.status === 'done' ? 'var(--accent)' : t.status === 'inprog' ? 'var(--blue)' : 'var(--text3)';
          const od = isOD(t);
          html += '<div style="padding:2px 0;display:flex;gap:8px;align-items:baseline">';
          html += '<span style="color:' + statusColor + ';font-size:10px;min-width:72px">' + STATUS_LABELS[t.status] + '</span>';
          html += '<span style="flex:1;color:' + (od ? 'var(--red)' : 'var(--text)') + '">' + t.name + '</span>';
          html += '<span style="color:var(--text3);font-size:10px">' + (a?.name?.split(' ')[0] || '') + ' · ' + (od ? '<span style="color:var(--red)">' + fmtDue(t) + '</span>' : t.due) + '</span>';
          html += '</div>';
          if (t.blockerNote) html += '<div style="color:var(--red);font-size:10px;padding-left:80px">↳ ' + t.blockerNote + '</div>';

          // Subtasks progress
          if (t.subtasks && t.subtasks.length) {
            const done = t.subtasks.filter(s => s.status === 'done').length;
            html += '<div style="color:var(--text3);font-size:10px;padding-left:80px">' + done + '/' + t.subtasks.length + ' steps complete</div>';
          }
        });
      }
      html += '</div>';
    });
    html += '</div>';
  });

  // Summary line
  const totalOpen = S.tasks.filter(t => t.status !== 'done').length;
  const totalDone = S.tasks.filter(t => t.status === 'done').length;
  const totalBlocked = S.tasks.filter(t => t.status === 'blocked').length;
  html += '<div style="padding-top:10px;border-top:1px solid var(--border);color:var(--text3);font-size:11px">';
  html += 'Summary: ' + totalOpen + ' open · ' + redFlags.length + ' red flags · ' + totalBlocked + ' blocked · ' + totalDone + ' done';
  html += '</div></div>';

  // Show in chat
  const div = addAIMsg(html);

  // Also send to email if connected
  if (S.msConfig.connected) {
    const plain = html.replace(/<[^>]*>/g, '').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#9888;/g,'⚠');
    try {
      const token = await getMSToken();
      const meRes = await fetch('https://graph.microsoft.com/v1.0/me', {headers:{Authorization:'Bearer '+token}});
      const me = await meRes.json();
      await sendEmail({to: me.mail||me.userPrincipalName, subject:'PM Agent Daily Report — '+today, body: plain});
      addAIMsg('Report also emailed to <strong>' + (me.mail||me.userPrincipalName) + '</strong>.');
    } catch(e) { /* silent fail — report shown in chat */ }
  } else {
    addAIMsg('<span style="font-size:11px;color:var(--text3)">Connect Microsoft 365 in the Email tab to also receive this by email every morning.</span>');
  }
}

function openScopeModal(clientId,svcName,svcId,inQueue=false){
  const c=S.clients.find(c=>c.id===clientId);

  const q=S._scopeQ;
  document.getElementById('scopeTitle').textContent=svcName+' — '+(c?.name||'')+(q?` (${q.idx+1} of ${q.services.length})`:'');
  const ownerSel=document.getElementById('sc-owner');

  [...matching,...others].forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=m.name+' · '+m.role+(matching.includes(m)?'':' (other)');ownerSel.appendChild(o);});
  if(ex?.ownerId) ownerSel.value=ex.ownerId;
  document.getElementById('sc-desc').value=ex?.scopeDesc||'';
  const builder=document.getElementById('delBuilder');builder.innerHTML='';
  const dels=ex?.deliverables||(SVC_TPL[svcName]||[]).slice(0,3).map(t=>({text:t,freq:'Monthly'}));

async function callAI(msg){
  const sys=buildSystemPrompt();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:sys,
        messages:[...S.chatHistory.slice(-10).map(m=>({role:m.role,content:typeof m.content==='string'?m.content.replace(/<[^>]+>/g,''):m.content})),{role:'user',content:msg}]})
    });
    const data=await res.json();
    return data.content?.[0]?.text||'Could not process that.';
  }catch(e){return 'Could not reach AI — check connection.';}
}

function buildSystemPrompt(){
  const today=td();
  const ctx=S.clients.map(c=>{
    return 'CLIENT: '+c.name+' ('+c.stage+')\n'+
      S.services.filter(s=>s.clientId===c.id).map(svc=>{
        const owner=S.team.find(m=>m.id===svc.ownerId);
        const open=S.tasks.filter(t=>t.svcId===svc.id&&t.status!=='done');
        const done=S.tasks.filter(t=>t.svcId===svc.id&&t.status==='done');
        return '  SERVICE: '+svc.name+' | Owner: '+(owner?.name||'unassigned')+
          '\n  Scope: '+(svc.scopeDesc||'not set')+
          '\n  Open tasks: '+open.map(t=>{
            const a=S.team.find(m=>m.id===t.ownerId);
            const subs=t.subtasks?.length?` [${t.subtasks.filter(s=>s.status==='done').length}/${t.subtasks.length} steps done]`:'';
            return '"'+t.name+'" status:'+t.status+(t.blockerNote?' BLOCKER:'+t.blockerNote:'')+' due:'+t.due+(isOD(t)?' OVERDUE':isTD(t)?' TODAY':'')+' ['+t.priority+'] by:'+(a?.name||'unassigned')+(t.clientVisible?' [client-visible]':' [internal]')+subs;
          }).join('; ')||'none'+
          '\n  Done: '+done.map(t=>'"'+t.name+'"').join(', ')||'none';
      }).join('\n');
  }).join('\n\n');

  return `You are a PM Agent for a GCC (Global Capability Centre) management firm. You help track and report on client deliverables across Finance, HR, TA, Legal, IT and Operations.

Today: ${today}

Data:
${ctx}

Team: ${S.team.map(m=>m.name+' ('+m.role+') | services: '+m.services.join(',')+' | open tasks: '+S.tasks.filter(t=>t.ownerId===m.id&&t.status!=='done').length).join('\n')}

Rules:
- For "daily status report": produce a SHORT, scannable briefing. STRICT FORMAT:
  Section 1 — RED FLAGS (overdue + blocked across ALL clients, max 2 lines each): "CLIENT · SERVICE · Task name · reason/days overdue"
  Section 2 — Per client (3-5 bullets max per client): client name as header, then one bullet per open task: "· Task name — Owner — Status — Due"
  Section 3 — Done today: one-liner list of completed items
  Section 4 — One-line overall summary
  TOTAL LENGTH: under 250 words. No paragraphs. No explanations. Bullets only. Be brutal about brevity.
- Internal report: include all tasks, blockers, team notes. Client report: only client-visible tasks, professional tone.
- For "draft client email": write a professional status update suitable to send to the client contact. Reference client-visible tasks only.
- For "draft task assignment email": write a brief email to the owner notifying them of the task.
- Use **bold** for names and key items. Use bullet lists.
- Surface blockers and overdue items prominently.
- Be direct and actionable. Under 300 words unless generating a full report.`;
}

function fmtAI(text){
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm,'<p><strong>$1</strong></p>')
    .replace(/🔴|❌/g,'<span style="color:var(--red)">■</span>')
    .replace(/🟡|⚠️/g,'<span style="color:var(--amber)">■</span>')
    .replace(/✅|🟢/g,'<span style="color:var(--accent)">■</span>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*?<\/li>\n?)+/gs,m=>'<ul>'+m+'</ul>')
    .split('\n\n').map(p=>p.startsWith('<')?p:`<p>${p}</p>`).join('');
}

function updateTaskStatus(taskId, sel) {
  const t = S.tasks.find(t => t.id === taskId);
  if (!t) return;
  t.status = sel.value;
  sel.className = 'status-select s-' + sel.value;
  // Auto-set pct
  if (sel.value === 'done') t.pct = 100;
  else if (sel.value === 'notstart') t.pct = 0;
  save(); renderSidebar();
  renderTrackerTable();
}

function updateSubtaskStatus(taskId, stId, sel) {
  const t = S.tasks.find(t => t.id === taskId);
  const st = t?.subtasks?.find(s => s.id === stId);
  if (!st) return;
  st.status = sel.value;
  sel.className = 'status-select s-' + sel.value;
  // Auto-update parent task pct
  if (t.subtasks.length) {
    t.pct = Math.round(t.subtasks.filter(s => s.status === 'done').length / t.subtasks.length * 100);
    if (t.pct === 100) t.status = 'done';
    else if (t.pct > 0 && t.status === 'notstart') t.status = 'inprog';
  }
  save(); renderSidebar();
  renderTrackerTable();
}

function saveComment(taskId, stId, val) {
  const t = S.tasks.find(t => t.id === taskId);
  if (!t) return;
  if (stId === null || stId === undefined) {
    t.comment = val;
  } else {
    const st = t.subtasks?.find(s => s.id === stId);
    if (st) st.comment = val;
  }
  save();
  document.getElementById('trackerUpdated').textContent =
    document.getElementById('trackerUpdated').textContent.replace(/ · Saved.*/, '') + ' · Saved ✓';
  setTimeout(() => {
    const el = document.getElementById('trackerUpdated');
    if (el) el.textContent = el.textContent.replace(' · Saved ✓', '');
  }, 2000);
}

function copyTrackerText() {
  const svc = S.services.find(s => s.id === trackerState.activeSvc);
  const tasks = S.tasks.filter(t => t.svcId === trackerState.activeSvc);

  text += ['#','Task','Owner','Due','Status','% Done','Comments'].join('\t') + '\n';
  let n = 0;
  tasks.forEach(t => {
    n++;
    const a = S.team.find(m => m.id === t.ownerId);
    const pct = t.pct !== undefined ? t.pct : t.status === 'done' ? 100 : 0;
    text += [n, t.name, a?.name||'', t.due||'', STATUS_LABELS[t.status], pct+'%', t.comment||''].join('\t') + '\n';
    t.subtasks?.forEach((st, si) => {

    });

    const btn = document.querySelector('[onclick="copyTrackerText()"]');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy report', 1500); }
  });
}

function renderHiringTracker(c){
  const tracker=S.hiringTracker.filter(h=>h.clientId===c.id);
  const plan=S.demandPlan.filter(d=>d.clientId===c.id);

  let html='<table class="hiring-table"><thead><tr>';
  html+='<th>#</th><th>Role</th><th>Candidate</th><th>Stage</th><th>Offer Date</th><th>Joining Date</th><th>Variance</th><th>Comments / Blockers</th>';
  html+='</tr></thead><tbody>';

  if(!tracker.length){
    html+='<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text3)">No candidates yet — add from demand plan or below</td></tr>';
  }

  tracker.forEach((h,i)=>{
    const dp=plan.find(d=>d.id===h.planId);
    // Calculate variance — days between target start and joining date
    let variance='—';let varClass='variance-ok';
    if(dp?.targetStart&&h.joiningDate){
      const diff=Math.round((new Date(h.joiningDate)-new Date(dp.targetStart))/86400000);
      if(diff>0){variance='+'+diff+'d late';varClass='variance-pos';}
      else if(diff<0){variance=Math.abs(diff)+'d early';varClass='variance-neg';}
      else{variance='On time';varClass='variance-ok';}
    }

    html+='<tr>';
    html+='<td style="color:var(--text3);font-family:var(--mono);font-size:11px">'+(i+1)+'</td>';
    html+='<td style="font-size:12px;color:var(--text2)">'+esc(h.role)+'</td>';
    html+='<td><input class="inline-edit" value="'+esc(h.candidateName||'')+'" placeholder="Candidate name..." onblur="updateTracker('+h.id+',"candidateName",this.value)"></td>';
    html+='<td><select class="inline-sel" onchange="updateTracker('+h.id+',"stage",this.value)">';
    STAGES.forEach(s=>{
      html+='<option value="'+s+'"'+(h.stage===s?' selected':'')+'>'+STAGE_LABELS[s]+'</option>';
    });
    html+='</select><span class="stage-badge stage-'+h.stage+'" style="margin-left:4px;font-size:9px">'+STAGE_LABELS[h.stage]+'</span></td>';
    html+='<td><input class="inline-edit" type="date" value="'+(h.offerDate||'')+'" onblur="updateTracker('+h.id+',"offerDate",this.value)" style="font-size:11px"></td>';
    html+='<td><input class="inline-edit" type="date" value="'+(h.joiningDate||'')+'" onblur="updateTracker('+h.id+',"joiningDate",this.value)" style="font-size:11px"></td>';
    html+='<td class="'+varClass+'">'+variance+'</td>';
    html+='<td>';
    if(h.blocker) html+='<div style="color:var(--red);font-size:10px;margin-bottom:2px">&#9888; '+esc(h.blocker)+'</div>';
    html+='<input class="inline-edit" value="'+esc(h.comment||'')+'" placeholder="Add comment..." onblur="updateTracker('+h.id+',"comment",this.value)">';
    html+='</td>';
    html+='</tr>';
  });

  html+='</tbody></table>';
  html+='<button class="btn-inline" style="width:100%" onclick="addTrackerRow('+c.id+')">+ Add candidate</button>';
  return html;
}

function setHiringView(v){hiringView=v;renderPanel();}
function setHiringClient(id){hiringClient=id;renderPanel();}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function addDemandRow(clientId){
  if(!window.nDP) window.nDP=1;
  S.demandPlan.push({id:window.nDP++,clientId,role:'',level:'',dept:'',headcount:1,location:'Pune',targetStart:'',budgetApproved:false,ownerId:S.team[0]?.id||null});
  save();renderPanel();
}

function addTrackerRow(clientId){
  if(!window.nHT) window.nHT=1;
  const firstPlan=S.demandPlan.find(d=>d.clientId===clientId);
  S.hiringTracker.push({id:window.nHT++,clientId,planId:firstPlan?.id||null,role:firstPlan?.role||'',candidateName:'',stage:'open',offerDate:'',joiningDate:'',comment:'',blocker:''});
  save();renderPanel();
}

function updateDemand(id,field,val){
  const d=S.demandPlan.find(d=>d.id===id);
  if(d){d[field]=val;save();renderPanel();}
}

function updateTracker(id,field,val){
  const h=S.hiringTracker.find(h=>h.id===id);
  if(h){h[field]=val;save();renderPanel();}
}

</script>
